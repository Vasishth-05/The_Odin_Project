<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .first{
        background-color: #1f2937;
        height: 85vh;
    }
    nav{
        display: flex;
        color: white;
        justify-content: space-around;
    }
    .logo{
        font-size: 30px;
        font-weight: 600;
        padding-top: 10px;
    }
    .links{
        display: flex;
        gap: 30px;
        padding-right: 30px;
        padding-top: 18px;
        font-size: 20px;
        font-weight: 500;
        color: #6d747d;
    }
    .face{
        display: flex;
        justify-content: space-around;
        margin-top: 160px;
    }
    .first-content{
        color: white;
        display:inline;
    }
    .Fone{
        font-size: 50px;
    }
    .Ftwo{
        color: #a7abb3;
        font-size: 25px;
        margin-top: 10px;
    }
    .fbtn{
        font-size: 30px;
        background-color: #3b82f6;
        height: 50px;
        width: 120px;
        text-align: center;
        border-radius: 10px;
        margin-top: 10px;
    }
    img{
        background-color: #6d747d;
        height: 200px;
        width: 400px;
    }
    .some{
        color: black;
        text-align: center;
        font-size: 30px;
        font-weight: 600;
        margin-top: 10px;
    }
</style>
<body>
    <div class="first">
        <nav>
            <div class="logo">
                Header logo
            </div>
            <div class="links">
                <div class="linkONE">header first link</div>
                <div class="linkTWO">header secont link</div>
                <div class="linkTHREE">header third link</div>
            </div>
        </nav>
        <div class="face">
            <div class="first-content">
                <div class="Fone">This website is <br> awesome</div>
                <div class="Ftwo">This website has some subtext that  <br>goes here under the main title. Its a  <br> smaller font and the color is lower contrast</div>
                <div class="fbtn">signup</div>
            </div>
            <img src="" alt="This is a placeholder for an image">
        </div>
    </div>
    <div class="some">SOME RANDOM INFORMATION.</div>
</html>
