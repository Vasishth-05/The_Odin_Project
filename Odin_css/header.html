<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.container{
    display: flex;
    justify-content: space-around;
    background-color: blanchedalmond;
    height: 100px;
    align-items: center;
}
.firstBox{
    display: flex;
    gap: 30px;
}
.thirdBox{
    display: flex;
    gap: 30px;
}
.one,.three{
    height: 40px;
    width: 90px;
    color: blue;
    background-color: blanchedalmond;
    align-content: center;
    border: 2px solid black;
    text-align: center;
    font-size: 20px;
}
.two{
    align-content: center;
    color: red;
    background-color: blanchedalmond;
    border: 2px solid Black;
    width: 90px;
    height: 40px;
    text-align: center;
    font-size: 30px;
}

</style>
<body>
        <div class="container">
            <div class="firstBox">
                <div class="one">One</div>
                <div class="one">Two</div>
                <div class="one">Three</div>
            </div>
            <div class="two">LOGO</div>
            <div class="thirdBox">
                <div class="three">four</div>
                <div class="three">five</div>
                <div class="three">six</div>
            </div>
        </div>
</body>
</html>
